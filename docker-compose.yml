# reservation-lab local infrastructure
#
# 목적
# - 애플리케이션을 local 프로필로 실행할 때 사용할 MySQL과 Redis를 띄운다.
# - 기본 테스트 프로필은 H2를 사용하므로, 단위/통합 테스트만 실행할 때는 이 파일이 필요 없다.
#
# 실행
# - 시작: docker compose up -d
# - 종료: docker compose down
# - 데이터까지 삭제: docker compose down -v
#
# 애플리케이션 실행 예시
# - SPRING_PROFILES_ACTIVE=local 로 실행하면 application.yml의 local 프로필이 적용된다.

services:
  mysql:
    # MySQL 8 계열을 사용한다. 현재 프로젝트는 JPA ddl-auto=update로 학습용 스키마를 자동 생성한다.
    image: mysql:8.4
    container_name: reservation-lab-mysql
    restart: unless-stopped
    environment:
      # root 계정 비밀번호. 로컬 개발용 값이며 운영 환경에 재사용하면 안 된다.
      MYSQL_ROOT_PASSWORD: root
      # 애플리케이션이 사용할 기본 데이터베이스 이름.
      MYSQL_DATABASE: reservation_lab
      # 애플리케이션 접속용 일반 계정.
      MYSQL_USER: reservation
      # 애플리케이션 접속용 일반 계정 비밀번호.
      MYSQL_PASSWORD: reservation
      # 컨테이너 내부 MySQL의 기본 시간대를 한국 시간으로 맞춘다.
      TZ: Asia/Seoul
    ports:
      # 호스트 3308 포트를 컨테이너 3306 포트에 연결한다.
      # 3306은 로컬 MySQL과 자주 충돌하므로 이 프로젝트 기본값은 3308로 둔다.
      # 포트를 바꾸면 application.yml의 MYSQL_PORT 기본값도 같이 맞추거나 실행 시 MYSQL_PORT를 넘긴다.
      - "3308:3306"
    volumes:
      # 컨테이너를 재시작해도 MySQL 데이터가 유지되도록 named volume을 사용한다.
      - mysql-data:/var/lib/mysql
    command:
      # 한글/이모지 등 UTF-8 데이터를 안전하게 저장하기 위한 기본 문자셋 설정.
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # depends_on은 "컨테이너 시작"만 보장하므로, 실제 DB 접속 가능 상태를 healthcheck로 확인한다.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    # 1단계 분산락, 2단계 TTL 점유, 3단계 캐시에서 사용할 Redis.
    image: redis:7.4
    container_name: reservation-lab-redis
    restart: unless-stopped
    ports:
      # 호스트 6379 포트를 컨테이너 6379 포트에 연결한다.
      # 로컬에 이미 Redis가 떠 있으면 왼쪽 값을 6380:6379처럼 바꾼다.
      - "6379:6379"
    volumes:
      # Redis 재시작 후에도 데이터를 보존한다. 캐시만 테스트할 때는 docker compose down -v로 지워도 된다.
      - redis-data:/data
    command:
      # appendonly yes는 Redis 쓰기 명령을 파일에 기록해 로컬 개발 중 재시작 복구가 가능하게 한다.
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      # redis-cli ping 결과가 PONG이면 Redis가 명령을 받을 수 있는 상태다.
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  # Docker가 관리하는 로컬 볼륨이다.
  # 특정 경로를 직접 지정하지 않아 OS별 경로 차이를 신경 쓰지 않아도 된다.
  mysql-data:
  redis-data:
